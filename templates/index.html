<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII ART WEB GUI</title>
    <!-- Link your external CSS file here -->
</head>
<body>

    <form action="/process" method ="POST">

    <div>
        <label for="fname">TextArea</label>
        <input type="text" id= "fname" name ="fname" placeholder="Input text">
    </div>

    <div class="form-group">
        <!-- This is a label element for the dropdown (select) element that follows.-->
      <label for="styles">Choose your style:</label>
      <select name="styles" id="styles">
        <option value="standard" selected="standard">Standard</option>
        <option value="shadow">Shadow</option>
        <option value="thinkertoy">Thinkertoy</option>
      </select>
    </div>

    <div>
        <input type = "submit">
    </div>

    <h1>Input: {{.data}}</h1>

    </form>

</body>
</html>
